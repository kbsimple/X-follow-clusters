# Geographic topic seeds for location-based clustering
#
# These are used to anchor geographic clusters independently of topical clusters.
# Accounts can belong to BOTH a topical cluster AND one or more geographic clusters.
#
# Usage:
#   python -m src.cluster.geo_cluster
#
# This runs a separate pass that clusters accounts by location only.

